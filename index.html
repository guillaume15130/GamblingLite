<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>GamblingLite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100svh;
      overflow: hidden;
    }
    canvas {
      display: block;
      /* Scale canvas to fit screen while keeping 480x800 ratio */
      max-width: 100vw;
      max-height: 100svh;
      width: auto !important;
      height: auto !important;
      aspect-ratio: 480 / 800;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
